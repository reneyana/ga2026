<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrega de Viveres</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
            padding: 20px;
            background: #ffffff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #35424a;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        input, textarea {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px;
            background: #35424a;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<header>
    <h1>Servicio de Entrega de Viveres</h1>
</header>

<div class="container">
    <h2>Información sobre la Entrega</h2>
    <p>Ofrecemos un servicio de entrega de víveres a las comunidades necesitadas. Si requiere asistencia, complete el formulario a continuación.</p>
    
    <h2>Solicitar Viveres</h2>
    <form id="order-form" onsubmit="handleSubmit(event)">
        <label for="name">Nombre Completo:</label>
        <input type="text" id="name" name="name" required>

        <label for="address">Dirección:</label>
        <input type="text" id="address" name="address" required>

        <label for="phone">Número de Teléfono:</label>
        <input type="tel" id="phone" name="phone" required>

        <label for="quantity">Cantidad de Viveres:</label>
        <input type="number" id="quantity" name="quantity" required>

        <label for="comments">Comentarios Adicionales:</label>
        <textarea id="comments" name="comments" rows="4"></textarea>

        <button type="submit">Enviar Solicitud</button>
    </form>
</div>

<script>
    async function handleSubmit(event) {
        event.preventDefault(); // Evita que el formulario se envíe de la manera tradicional
        const form = document.getElementById('order-form');
        const formData = new FormData(form);
        
        // Reemplaza 'URL_DE_TU_WEB_APP' con la URL de tu Google Apps Script
        const response = await fetch('https://script.google.com/macros/s/AKfycbzrfvmdKhL5ewQUE_pPOuLxeAqUx2tEACwGvkSm3J-VL-gZ1I_DNxu-mTIJi6EnhSU/exec', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        if (result.result === "success") {
            alert('Solicitud enviada con éxito.');
            form.reset(); // Reinicia el formulario
        } else {
            alert('Error al enviar la solicitud.');
        }
    }
</script>

</body>
</html>
